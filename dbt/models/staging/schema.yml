version: 2

models:
  - name: stg_matches_odds
    columns:
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: result_ft
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['H', 'D', 'A']

  - name: stg_pipeline_run
    columns:
      - name: run_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
